
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus • Chat</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-tertiary: #1e1f22;
            --bg-secondary: #2b2d31;
            --bg-primary: #313338;
            --brand: #5865f2;
            --brand-hover: #4752c4;
            --danger: #da373c;
            --danger-hover: #a12828;
            --success: #23a559;
            --text-normal: #dbdee1;
            --text-muted: #949ba4;
            --header-primary: #f2f3f5;
            --interactive-normal: #b5bac1;
            --interactive-hover: #dbdee1;
            --interactive-active: #fff;
            --background-modifier-hover: rgba(78, 80, 88, 0.16);
            --background-modifier-active: rgba(78, 80, 88, 0.24);
            --input-bg: #1e1f22;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', system-ui, sans-serif; background: var(--bg-primary); color: var(--text-normal); height: 100vh; overflow: hidden; }

        /* Typography & Globals */
        h1, h2, h3 { color: var(--header-primary); font-weight: 600; }
        .subtitle { color: var(--text-muted); font-size: 14px; margin-bottom: 24px; }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-thumb { background: #1a1b1e; border-radius: 4px; }

        /* Inputs & Buttons */
        input { width: 100%; padding: 10px 12px; background: var(--input-bg); border: none; border-radius: 4px; color: var(--text-normal); margin-bottom: 16px; font-size: 14px; transition: 0.2s ease; }
        input:focus { outline: none; box-shadow: 0 0 0 2px var(--brand); }
        .input-label { font-size: 12px; color: var(--text-muted); text-transform: uppercase; font-weight: 700; margin-bottom: 8px; display: block; }
        
        button { width: 100%; padding: 10px 16px; background: var(--brand); color: white; border: none; border-radius: 4px; font-weight: 600; font-size: 14px; cursor: pointer; transition: 0.2s; margin-bottom: 8px; }
        button:hover { background: var(--brand-hover); }
        button.danger { background: var(--danger); }
        button.danger:hover { background: var(--danger-hover); }
        button.secondary { background: #4e5058; }
        button.secondary:hover { background: #6d6f78; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }

        /* Modals */
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); display: flex; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(2px); }
        .modal-card { background: var(--bg-primary); width: 440px; border-radius: 8px; padding: 32px; box-shadow: 0 8px 24px rgba(0,0,0,0.4); position: relative; }
        .close-btn { position: absolute; top: 16px; right: 16px; cursor: pointer; color: var(--text-muted); font-size: 24px; transition: 0.2s; }
        .close-btn:hover { color: var(--interactive-active); }

        /* App Layout */
        #app { display: none; height: 100vh; width: 100%; }

        /* Server Sidebar */
        #servers { width: 72px; background: var(--bg-tertiary); padding: 12px 0; display: flex; flex-direction: column; align-items: center; gap: 8px; z-index: 10; }
        .server-icon { width: 48px; height: 48px; background: var(--bg-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 24px; cursor: pointer; transition: 0.3s ease; }
        .server-icon:hover, .server-icon.active { border-radius: 16px; background: var(--brand); color: white; }
        .divider { width: 32px; height: 2px; background: #35363c; border-radius: 1px; }

        /* Channels/DMs Sidebar */
        #sidebar { width: 240px; background: var(--bg-secondary); display: flex; flex-direction: column; z-index: 5; }
        .sidebar-header { height: 48px; padding: 0 16px; display: flex; align-items: center; font-weight: 700; color: var(--header-primary); border-bottom: 1px solid var(--bg-tertiary); }
        .channel-list { flex: 1; padding: 12px 8px; overflow-y: auto; }
        .nav-item { padding: 8px 12px; margin: 2px 0; border-radius: 4px; cursor: pointer; color: var(--interactive-normal); display: flex; align-items: center; gap: 12px; font-weight: 500; }
        .nav-item:hover { background: var(--background-modifier-hover); color: var(--interactive-hover); }
        .nav-item.active { background: var(--background-modifier-active); color: var(--interactive-active); }
        .nav-item img { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; }
        .section-title { margin: 16px 8px 4px; font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.5px; }

        /* User Area */
        #user-footer { height: 52px; background: #232428; padding: 0 8px; display: flex; align-items: center; gap: 8px; }
        .user-info { flex: 1; display: flex; align-items: center; gap: 8px; overflow: hidden; padding: 4px; border-radius: 4px; cursor: pointer; transition: 0.2s; }
        .user-info:hover { background: rgba(255,255,255,0.1); }
        .user-name-tag { font-weight: 600; font-size: 14px; color: var(--header-primary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .action-icon { cursor: pointer; color: var(--interactive-normal); font-size: 18px; background: none; border: none; padding: 4px; border-radius: 4px; display: flex; }
        .action-icon:hover { color: var(--interactive-active); background: var(--background-modifier-hover); }

        /* Main Content Pane */
        #main-pane { flex: 1; display: flex; flex-direction: column; background: var(--bg-primary); }
        #top-header { height: 48px; padding: 0 16px; display: flex; align-items: center; border-bottom: 1px solid var(--bg-tertiary); font-weight: 600; color: var(--header-primary); gap: 16px; }
        
        /* Chat View */
        #chat-view { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        #chat-messages { flex: 1; overflow-y: auto; padding: 16px 0; display: flex; flex-direction: column; }
        .message { display: flex; gap: 16px; padding: 4px 16px; margin-top: 16px; }
        .message:hover { background: rgba(2,2,2,0.06); }
        .avatar { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; cursor: pointer; }
        .msg-body { flex: 1; }
        .msg-header { display: flex; align-items: baseline; gap: 8px; }
        .msg-user { font-weight: 500; color: var(--header-primary); cursor: pointer; }
        .msg-user:hover { text-decoration: underline; }
        .msg-time { font-size: 12px; color: var(--text-muted); }
        .msg-text { margin-top: 4px; line-height: 1.5; color: var(--text-normal); word-break: break-word; }
        
        #input-area { padding: 0 16px 24px; }
        #msgInput { width: 100%; background: #383a40; border: none; border-radius: 8px; padding: 14px 16px; color: var(--text-normal); font-size: 15px; margin: 0; }

        /* Right Sidebar (Members) */
        #right-bar { width: 240px; background: var(--bg-secondary); padding: 16px 8px; overflow-y: auto; }
        .member-item { padding: 6px 8px; margin: 2px 0; border-radius: 4px; display: flex; align-items: center; gap: 12px; cursor: pointer; color: var(--interactive-normal); font-weight: 500; }
        .member-item:hover { background: var(--background-modifier-hover); color: var(--interactive-active); }
        .status-dot { width: 10px; height: 10px; background: var(--success); border-radius: 50%; position: absolute; bottom: -2px; right: -2px; border: 2px solid var(--bg-secondary); }

        /* Friends Dashboard */
        #friends-view { flex: 1; display: none; flex-direction: column; background: var(--bg-primary); padding: 24px 32px; overflow-y: auto; }
        .friends-header-tabs { display: flex; gap: 16px; border-bottom: 1px solid var(--bg-tertiary); padding-bottom: 12px; margin-bottom: 24px; }
        .tab-btn { background: transparent; color: var(--interactive-normal); font-weight: 600; padding: 4px 8px; border-radius: 4px; cursor: pointer; border: none; width: auto; font-size: 16px; }
        .tab-btn:hover { background: var(--background-modifier-hover); color: var(--interactive-hover); }
        .tab-btn.active { background: var(--background-modifier-active); color: var(--interactive-active); }
        
        .list-table { width: 100%; display: flex; flex-direction: column; gap: 8px; }
        .list-row { display: flex; align-items: center; justify-content: space-between; padding: 12px; background: var(--bg-secondary); border-radius: 8px; border: 1px solid transparent; transition: 0.2s; }
        .list-row:hover { border-color: #3f4147; background: #35363c; }
        .user-cell { display: flex; align-items: center; gap: 12px; font-weight: 600; color: var(--header-primary); }
        .actions-cell { display: flex; gap: 8px; }
        .action-btn-small { padding: 6px 12px; font-size: 13px; width: auto; border-radius: 4px; margin: 0; }

        .badge { background: var(--danger); color: white; font-size: 10px; padding: 2px 6px; border-radius: 12px; margin-left: 8px; font-weight: bold; }
    </style>
</head>
<body>

<div id="authScreen" class="modal-overlay">
    <div class="modal-card" id="loginCard">
        <h1 style="text-align:center">Welcome back!</h1>
        <p class="subtitle" style="text-align:center">We're so excited to see you again!</p>
        <label class="input-label">Username</label>
        <input id="l-user" onkeydown="if(event.key==='Enter') handleLogin()">
        <label class="input-label">Password</label>
        <input id="l-pass" type="password" onkeydown="if(event.key==='Enter') handleLogin()">
        <button onclick="handleLogin()">Log In</button>
        <p style="margin-top:8px; font-size:14px; color:var(--text-muted); text-align:center;">
            Need an account? <span onclick="toggleAuth(false)" style="color:var(--brand); cursor:pointer">Register</span>
        </p>
    </div>
    <div class="modal-card" id="registerCard" style="display:none">
        <h1 style="text-align:center">Create an account</h1>
        <label class="input-label">Username</label>
        <input id="r-user">
        <label class="input-label">Password</label>
        <input id="r-pass" type="password">
        <label class="input-label">Avatar URL (Optional)</label>
        <input id="r-pfp" placeholder="Leave blank for random">
        <button onclick="handleRegister()">Continue</button>
        <p style="margin-top:8px; font-size:14px; color:var(--text-muted); text-align:center;">
            Already have an account? <span onclick="toggleAuth(true)" style="color:var(--brand); cursor:pointer">Log In</span>
        </p>
    </div>
</div>

<div id="settingsModal" class="modal-overlay" style="display:none">
    <div class="modal-card" style="width: 500px;">
        <div class="close-btn" onclick="closeModals()">✕</div>
        <h2>My Account</h2>
        <p class="subtitle" id="settingsUsernameDisplay"></p>
        
        <label class="input-label">New Username (Optional)</label>
        <input id="s-user" placeholder="Enter new username">
        
        <label class="input-label">New Avatar URL (Optional)</label>
        <input id="s-pfp" placeholder="Enter image URL">
        
        <label class="input-label">New Password (Optional)</label>
        <input id="s-new-pass" type="password" placeholder="Enter new password">

        <hr style="border: 0; height: 1px; background: #3f4147; margin: 20px 0;">
        
        <label class="input-label" style="color: var(--danger)">Current Password (Required to save changes)</label>
        <input id="s-curr-pass" type="password" placeholder="Verify it's you">

        <div style="display:flex; gap: 12px; margin-top: 16px;">
            <button class="secondary" onclick="closeModals()" style="margin:0">Cancel</button>
            <button onclick="saveSettings()" style="margin:0">Save Changes</button>
        </div>
        
        <hr style="border: 0; height: 1px; background: #3f4147; margin: 20px 0;">
        <div style="display:flex; justify-content: space-between;">
            <button class="secondary" style="width:auto; margin:0;" onclick="logout()">Sign Out</button>
            <button class="danger" style="width:auto; margin:0;" onclick="deleteAccount()">Delete Account</button>
        </div>
    </div>
</div>

<div id="profileModal" class="modal-overlay" style="display:none">
    <div class="modal-card" style="width: 320px; text-align: center; padding: 24px;">
        <div class="close-btn" onclick="closeModals()">✕</div>
        <img id="targetAvatar" src="" style="width: 96px; height: 96px; border-radius: 50%; margin: 0 auto 16px; border: 6px solid var(--bg-primary);">
        <h2 id="targetUsername">Username</h2>
        <p class="subtitle" id="targetStatus"></p>
        
        <div style="display: flex; flex-direction: column; gap: 8px; margin-top: 16px;">
            <button id="btnMessage" class="secondary" style="margin:0" onclick="openDMFromProfile()">Send Message</button>
            <button id="btnFriend" style="margin:0" onclick="toggleFriendAction()">Add Friend</button>
            <button id="btnBlock" class="danger" style="margin:0" onclick="toggleBlockAction()">Block User</button>
        </div>
    </div>
</div>

<div id="app">
    <div id="servers">
        <div class="server-icon active" onclick="switchMainView('friends')" title="Direct Messages">🏠</div>
        <div class="divider"></div>
        <div class="server-icon" onclick="switchMainView('server')" title="Nexus Hub">N</div>
    </div>

    <div id="sidebar">
        <div class="sidebar-header" id="sidebar-header-text">Nexus Hub</div>
        <div class="channel-list" id="sidebar-lists"></div>
        <div id="user-footer">
            <div class="user-info" onclick="openSettings()">
                <img id="myPfp" class="avatar" src="" style="width:32px; height:32px;">
                <div class="user-name-tag" id="myName"></div>
            </div>
            <button class="action-icon" onclick="openSettings()" title="User Settings">⚙️</button>
        </div>
    </div>

    <div id="main-pane">
        <div id="top-header">
            <span id="chat-header-icon" style="color:var(--text-muted); font-size:20px;">#</span>
            <span id="chat-header-text">general</span>
        </div>

        <div id="chat-view">
            <div id="chat-messages"></div>
            <div id="input-area">
                <input id="msgInput" placeholder="Message #general" onkeydown="if(event.key==='Enter') sendMsg()">
            </div>
        </div>

        <div id="friends-view">
            <div class="friends-header-tabs">
                <button class="tab-btn active" onclick="switchFriendTab('online', this)">Online</button>
                <button class="tab-btn" onclick="switchFriendTab('pending', this)">Pending <span id="pending-badge" class="badge" style="display:none;">0</span></button>
                <button class="tab-btn" onclick="switchFriendTab('blocked', this)">Blocked</button>
            </div>
            <div id="friends-list-container" class="list-table"></div>
        </div>
    </div>

    <div id="right-bar">
        <div class="section-title">Online — <span id="online-count">0</span></div>
        <div id="member-list"></div>
    </div>
</div>

<script>
// Supabase Config
const SB_URL = "https://tmyozwdtjsvmtrcqsrxe.supabase.co";
const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRteW96d2R0anN2bXRyY3FzcnhlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3MDA4MTQsImV4cCI6MjA5MjI3NjgxNH0.NDTc8N9aSBbRSxBHJOgSdVO5fKevU2hRlb_nbhG2Eb0";
const client = supabase.createClient(SB_URL, SB_KEY);

let currentUser = null;
let currentChat = { type: "channel", id: "#general" };
let realtimeChannel = null;
let currentViewMode = "server";

// Relationship Arrays
let myFriends = [];
let myBlocks = [];
let incomingRequests = [];
let outgoingRequests = [];
let allProfilesCache = []; 
let targetUserForModal = null; 

/* --- INIT & AUTH --- */
window.onload = () => {
    try {
        const session = localStorage.getItem('nexus_session');
        if (session) {
            currentUser = JSON.parse(session);
            if(currentUser && currentUser.name) {
                initApp();
            } else {
                throw new Error("Invalid session data");
            }
        } else {
            document.getElementById('authScreen').style.display = 'flex';
        }
    } catch (e) {
        console.error("Session load error:", e);
        localStorage.removeItem('nexus_session');
        document.getElementById('authScreen').style.display = 'flex';
    }
};

function toggleAuth(showLogin) {
    document.getElementById('loginCard').style.display = showLogin ? 'block' : 'none';
    document.getElementById('registerCard').style.display = showLogin ? 'none' : 'block';
}

async function handleRegister() {
    try {
        const name = document.getElementById('r-user').value.trim();
        const pass = document.getElementById('r-pass').value;
        let pfp = document.getElementById('r-pfp').value.trim() || `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}`;
        
        if (!name || !pass) return alert("Please fill all fields.");
        
        const { error } = await client.from('profiles').insert({ name, password: pass, avatar_url: pfp });
        if (error) {
            console.error(error);
            return alert(`Registration Error: ${error.message}`);
        }
        
        alert("Account created! Please log in.");
        toggleAuth(true);
    } catch (err) {
        alert("An unexpected error occurred during registration.");
        console.error(err);
    }
}

async function handleLogin() {
    try {
        const name = document.getElementById('l-user').value.trim();
        const pass = document.getElementById('l-pass').value;
        if (!name || !pass) return alert("Please enter username and password.");

        const { data, error } = await client.from('profiles').select('*').eq('name', name).single();
        
        if (error) {
            console.error("Database Login Error:", error);
            return alert("Could not find account. Ensure your database 'profiles' table exists.");
        }
        
        if (!data || data.password !== pass) return alert("Invalid username or password.");
        
        currentUser = data;
        localStorage.setItem('nexus_session', JSON.stringify(data));
        initApp();
    } catch (err) {
        alert("An unexpected error occurred during login.");
        console.error(err);
    }
}

async function initApp() {
    document.getElementById('authScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    document.getElementById('myName').textContent = currentUser.name;
    document.getElementById('myPfp').src = currentUser.avatar_url;

    await loadProfilesCache();
    await loadRelationships();
    switchMainView('server'); 
    subscribeToRealtime();
}

async function loadProfilesCache() {
    try {
        const { data, error } = await client.from('profiles').select('name, avatar_url');
        if (error) throw error;
        allProfilesCache = data || [];
    } catch (err) {
        console.error("Error loading profiles:", err);
        allProfilesCache = [];
    }
}

function getAvatar(name) {
    const profile = allProfilesCache.find(p => p.name === name);
    return profile ? profile.avatar_url : `https://api.dicebear.com/7.x/avataaars/svg?seed=${name}`;
}

/* --- SETTINGS --- */
function openSettings() {
    document.getElementById('settingsUsernameDisplay').textContent = "Logged in as: " + currentUser.name;
    document.getElementById('s-user').value = currentUser.name;
    document.getElementById('s-pfp').value = currentUser.avatar_url;
    document.getElementById('s-new-pass').value = '';
    document.getElementById('s-curr-pass').value = '';
    document.getElementById('settingsModal').style.display = 'flex';
}

function closeModals() {
    document.getElementById('settingsModal').style.display = 'none';
    document.getElementById('profileModal').style.display = 'none';
}

async function saveSettings() {
    const currPass = document.getElementById('s-curr-pass').value;
    if (currPass !== currentUser.password) return alert("Incorrect current password.");

    const newPfp = document.getElementById('s-pfp').value.trim();
    const newUser = document.getElementById('s-user').value.trim();
    const newPass = document.getElementById('s-new-pass').value;

    let updates = {};
    if (newPfp && newPfp !== currentUser.avatar_url) updates.avatar_url = newPfp;
    if (newUser && newUser !== currentUser.name) updates.name = newUser;
    if (newPass) updates.password = newPass;

    if (Object.keys(updates).length === 0) return closeModals();

    try {
        const { error } = await client.from('profiles').update(updates).eq('name', currentUser.name);
        if(error) {
            console.error(error);
            return alert(`Failed to update profile: ${error.message}`);
        }
        
        // Update local state
        if (updates.name) currentUser.name = updates.name;
        if (updates.avatar_url) currentUser.avatar_url = updates.avatar_url;
        if (updates.password) currentUser.password = updates.password;

        localStorage.setItem('nexus_session', JSON.stringify(currentUser));
        closeModals();
        location.reload(); 
    } catch (err) {
        console.error(err);
        alert("Critical error updating profile.");
    }
}

async function deleteAccount() {
    if(!confirm("Are you sure? This cannot be undone.")) return;
    try {
        await client.from('profiles').delete().eq('name', currentUser.name);
        logout();
    } catch (e) {
        console.error(e);
        alert("Failed to delete account.");
    }
}

function logout() {
    localStorage.removeItem('nexus_session');
    location.reload();
}

/* --- VIEWS & NAVIGATION --- */
function switchMainView(mode) {
    currentViewMode = mode;
    const serversArr = document.querySelectorAll('.server-icon');
    if(serversArr.length > 1) {
        serversArr[0].classList.toggle('active', mode === 'friends');
        serversArr[1].classList.toggle('active', mode === 'server');
    }

    const sidebarHeader = document.getElementById('sidebar-header-text');
    const sidebarLists = document.getElementById('sidebar-lists');

    if (mode === 'server') {
        sidebarHeader.textContent = "Nexus Hub";
        sidebarLists.innerHTML = `
            <div class="section-title">Text Channels</div>
            <div class="nav-item active" data-type="channel" data-id="#general" onclick="switchChat(this, 'channel', '#general')"><span>#</span> general</div>
            <div class="nav-item" data-type="channel" data-id="#off-topic" onclick="switchChat(this, 'channel', '#off-topic')"><span>#</span> off-topic</div>
        `;
        document.getElementById('chat-view').style.display = 'flex';
        document.getElementById('friends-view').style.display = 'none';
        document.getElementById('right-bar').style.display = 'block';
        
        const generalBtn = sidebarLists.querySelector('.nav-item');
        switchChat(generalBtn, 'channel', '#general');
        loadMembers();

    } else if (mode === 'friends') {
        sidebarHeader.textContent = "Direct Messages";
        renderDMSidebar();
        
        document.getElementById('chat-view').style.display = 'none';
        document.getElementById('friends-view').style.display = 'flex';
        document.getElementById('right-bar').style.display = 'none';
        document.getElementById('top-header').innerHTML = `<span style="font-size:20px;">👋</span><span>Friends</span>`;
        
        const firstTab = document.querySelector('.tab-btn');
        if(firstTab) switchFriendTab('online', firstTab);
    }
}

function renderDMSidebar() {
    if (currentViewMode !== 'friends') return;
    const sidebarLists = document.getElementById('sidebar-lists');
    sidebarLists.innerHTML = `<div class="nav-item" onclick="switchMainView('friends')">👋 Friends Dashboard</div><div class="section-title">Direct Messages</div>`;
    
    myFriends.forEach(friendName => {
        const dmKey = [currentUser.name, friendName].sort().join('_');
        const isActive = (currentChat.type === 'dm' && currentChat.id === dmKey) ? 'active' : '';
        sidebarLists.innerHTML += `
            <div class="nav-item ${isActive}" onclick="switchChat(this, 'dm', '${friendName}')">
                <img src="${getAvatar(friendName)}"> ${friendName}
            </div>
        `;
    });
}

/* --- RELATIONSHIPS --- */
async function loadRelationships() {
    try {
        const { data: outData, error: outErr } = await client.from('user_relationships').select('*').eq('user_name', currentUser.name);
        const { data: inData, error: inErr } = await client.from('user_relationships').select('*').eq('target_name', currentUser.name);

        if (outErr) console.error("Relationship Read Error (Out):", outErr);
        if (inErr) console.error("Relationship Read Error (In):", inErr);

        myFriends = []; myBlocks = []; outgoingRequests = []; incomingRequests = [];
        
        if (outData) {
            outData.forEach(r => {
                if (r.status === 'friend') myFriends.push(r.target_name);
                if (r.status === 'blocked') myBlocks.push(r.target_name);
                if (r.status === 'pending') outgoingRequests.push(r.target_name);
            });
        }
        if (inData) {
            inData.forEach(r => {
                if (r.status === 'friend' && !myFriends.includes(r.user_name)) myFriends.push(r.user_name);
                if (r.status === 'pending') incomingRequests.push(r.user_name);
            });
        }

        const badge = document.getElementById('pending-badge');
        if (incomingRequests.length > 0) {
            badge.style.display = 'inline-block';
            badge.textContent = incomingRequests.length;
        } else {
            badge.style.display = 'none';
        }
    } catch (e) {
        console.error("Critical error loading relationships:", e);
    }
}

function openUserProfile(name) {
    if (name === currentUser.name) return;
    targetUserForModal = name;
    
    document.getElementById('targetAvatar').src = getAvatar(name);
    document.getElementById('targetUsername').textContent = name;
    
    const isFriend = myFriends.includes(name);
    const isBlocked = myBlocks.includes(name);
    const isPendingOut = outgoingRequests.includes(name);
    
    document.getElementById('targetStatus').textContent = isBlocked ? "You blocked this user." : (isFriend ? "You are friends." : "");
    
    const btnF = document.getElementById('btnFriend');
    if (isFriend) {
        btnF.textContent = "Remove Friend"; btnF.className = "secondary"; btnF.disabled = false;
    } else if (isPendingOut) {
        btnF.textContent = "Request Sent"; btnF.className = "secondary"; btnF.disabled = true;
    } else {
        btnF.textContent = "Send Friend Request"; btnF.className = ""; btnF.disabled = false;
    }
    btnF.style.display = isBlocked ? "none" : "block";

    const btnB = document.getElementById('btnBlock');
    btnB.textContent = isBlocked ? "Unblock User" : "Block User";
    
    document.getElementById('btnMessage').style.display = isBlocked ? "none" : "block";
    document.getElementById('profileModal').style.display = 'flex';
}

async function toggleFriendAction() {
    const target = targetUserForModal;
    try {
        if (myFriends.includes(target)) {
            await client.from('user_relationships').delete().match({ user_name: currentUser.name, target_name: target });
            await client.from('user_relationships').delete().match({ user_name: target, target_name: currentUser.name });
        } else {
            await client.from('user_relationships').insert({ user_name: currentUser.name, target_name: target, status: 'pending' });
        }
        closeModals(); await loadRelationships(); renderDMSidebar(); switchFriendTab('online');
    } catch(e) { console.error(e); }
}

async function handleRequest(target, accept) {
    try {
        if (accept) {
            await client.from('user_relationships').update({ status: 'friend' }).match({ user_name: target, target_name: currentUser.name });
            await client.from('user_relationships').insert({ user_name: currentUser.name, target_name: target, status: 'friend' });
        } else {
            await client.from('user_relationships').delete().match({ user_name: target, target_name: currentUser.name });
        }
        await loadRelationships();
        switchFriendTab('pending');
    } catch(e) { console.error(e); }
}

async function toggleBlockAction() {
    const target = targetUserForModal;
    try {
        if (myBlocks.includes(target)) {
            await client.from('user_relationships').delete().match({ user_name: currentUser.name, target_name: target, status: 'blocked' });
        } else {
            await client.from('user_relationships').delete().match({ user_name: currentUser.name, target_name: target });
            await client.from('user_relationships').delete().match({ user_name: target, target_name: currentUser.name });
            await client.from('user_relationships').insert({ user_name: currentUser.name, target_name: target, status: 'blocked' });
        }
        closeModals(); await loadRelationships(); loadMembers(); switchFriendTab('blocked');
    } catch(e) { console.error(e); }
}

async function unblockUser(target) {
    try {
        await client.from('user_relationships').delete().match({ user_name: currentUser.name, target_name: target, status: 'blocked' });
        await loadRelationships();
        switchFriendTab('blocked');
    } catch(e) { console.error(e); }
}

function switchFriendTab(tab, el = null) {
    if (el) {
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
    }
    const container = document.getElementById('friends-list-container');
    container.innerHTML = '';

    if (tab === 'online') {
        if (myFriends.length === 0) return container.innerHTML = `<p class="subtitle" style="text-align:center; margin-top:40px;">You don't have any friends yet.</p>`;
        myFriends.forEach(f => {
            container.innerHTML += `
                <div class="list-row">
                    <div class="user-cell"><img src="${getAvatar(f)}" class="avatar"> ${f}</div>
                    <div class="actions-cell">
                        <button class="action-btn-small secondary" onclick="openUserProfile('${f}')">Profile</button>
                        <button class="action-btn-small" onclick="switchChat(null, 'dm', '${f}')">Message</button>
                    </div>
                </div>`;
        });
    } else if (tab === 'pending') {
        if (incomingRequests.length === 0 && outgoingRequests.length === 0) return container.innerHTML = `<p class="subtitle" style="text-align:center; margin-top:40px;">No pending requests.</p>`;
        
        incomingRequests.forEach(f => {
            container.innerHTML += `
                <div class="list-row">
                    <div class="user-cell"><img src="${getAvatar(f)}" class="avatar"> ${f} <span style="font-size:12px; color:var(--text-muted); font-weight:normal">(Incoming)</span></div>
                    <div class="actions-cell">
                        <button class="action-btn-small" style="background:var(--success)" onclick="handleRequest('${f}', true)">Accept</button>
                        <button class="action-btn-small danger" onclick="handleRequest('${f}', false)">Decline</button>
                    </div>
                </div>`;
        });
        outgoingRequests.forEach(f => {
            container.innerHTML += `
                <div class="list-row">
                    <div class="user-cell"><img src="${getAvatar(f)}" class="avatar"> ${f} <span style="font-size:12px; color:var(--text-muted); font-weight:normal">(Outgoing)</span></div>
                    <div class="actions-cell"><button class="action-btn-small secondary" disabled>Pending...</button></div>
                </div>`;
        });
    } else if (tab === 'blocked') {
        if (myBlocks.length === 0) return container.innerHTML = `<p class="subtitle" style="text-align:center; margin-top:40px;">You haven't blocked anyone.</p>`;
        myBlocks.forEach(f => {
            container.innerHTML += `
                <div class="list-row">
                    <div class="user-cell"><img src="${getAvatar(f)}" class="avatar"> ${f}</div>
                    <div class="actions-cell"><button class="action-btn-small secondary" onclick="unblockUser('${f}')">Unblock</button></div>
                </div>`;
        });
    }
}

function openDMFromProfile() {
    closeModals();
    switchChat(null, 'dm', targetUserForModal);
}

/* --- CHAT SYSTEM --- */
async function switchChat(el, type, id) {
    if (el) {
        document.querySelectorAll('.nav-item').forEach(item => item.classList.remove('active'));
        el.classList.add('active');
    }

    if (type === "channel") {
        currentChat = { type: "channel", id: id };
        document.getElementById('chat-header-icon').textContent = "#";
        document.getElementById('chat-header-text').textContent = id.replace('#', '');
        document.getElementById('msgInput').placeholder = `Message ${id}`;
    } else if (type === "dm") {
        const otherUser = id;
        if (myBlocks.includes(otherUser)) return alert("You cannot message a blocked user.");
        
        const names = [currentUser.name, otherUser].sort();
        currentChat = { type: "dm", id: `${names[0]}_${names[1]}` };
        
        document.getElementById('chat-header-icon').textContent = "@";
        document.getElementById('chat-header-text').textContent = otherUser;
        document.getElementById('msgInput').placeholder = `Message @${otherUser}`;
        
        document.getElementById('chat-view').style.display = 'flex';
        document.getElementById('friends-view').style.display = 'none';
        renderDMSidebar();
    }

    await loadMessages();
    subscribeToRealtime();
}

async function loadMessages() {
    try {
        let query = client.from('messages').select('*').order('created_at', { ascending: true }).limit(100);
        if (currentChat.type === "channel") query = query.eq('channel', currentChat.id);
        else query = query.eq('dm_key', currentChat.id);

        const { data, error } = await query;
        if(error) throw error;

        const container = document.getElementById('chat-messages');
        container.innerHTML = '';
        
        if (data) {
            data.forEach(m => {
                if (myBlocks.includes(m.name)) return;
                renderMessage(m);
            });
        }
    } catch (e) {
        console.error("Error loading messages:", e);
    }
}

function renderMessage(m) {
    const container = document.getElementById('chat-messages');
    const time = new Date(m.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});

    const div = document.createElement('div');
    div.className = 'message';
    div.innerHTML = `
        <img class="avatar" src="${m.avatar_url}" onclick="openUserProfile('${m.name}')">
        <div class="msg-body">
            <div class="msg-header">
                <span class="msg-user" onclick="openUserProfile('${m.name}')">${m.name}</span>
                <span class="msg-time">${time}</span>
            </div>
            <div class="msg-text">${m.text}</div>
        </div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
}

async function sendMsg() {
    const input = document.getElementById('msgInput');
    let text = input.value.trim();
    if (!text || !currentUser) return;

    // ⏱ COOLDOWN
    const now = Date.now();
    if (!window.lastMessageTime) window.lastMessageTime = 0;

    if (now - window.lastMessageTime < 1500) {
        alert("Slow down! You're sending messages too fast.");
        return;
    }
    window.lastMessageTime = now;

    // 🧠 ADVANCED PROFANITY FILTER
    // 🧠 STRONGER PROFANITY FILTER (catches split words)

const bannedWords = ["cunt","pus","fuck","shit","bitch","asshole","nigga","nigger","dick","pussy","dih"];

// normalize (same as before)
function normalize(text) {
    return text
        .toLowerCase()
        .replace(/1|!/g, "i")
        .replace(/3/g, "e")
        .replace(/4|@/g, "a")
        .replace(/0/g, "o")
        .replace(/5/g, "s")
        .replace(/7/g, "t")
        .replace(/[^a-z]/g, "");
}

function censorMessage(original) {
    const normalizedFull = normalize(original);

    let result = original;

    bannedWords.forEach(bad => {
        if (normalizedFull.includes(bad)) {
            // replace ANY letters/spaces/punctuation forming that word
            const pattern = bad.split("").join("[^a-zA-Z0-9]*"); 
            const regex = new RegExp(pattern, "gi");

            result = result.replace(regex, match => "*".repeat(match.length));
        }
    });

    return result;
}

text = censorMessage(text);

    input.value = '';

    const payload = {
        name: currentUser.name,
        text: text,
        avatar_url: currentUser.avatar_url
    };

    if (currentChat.type === "channel") payload.channel = currentChat.id;
    else payload.dm_key = currentChat.id;

    try {
        const { error } = await client.from('messages').insert(payload);
        if (error) throw error;
    } catch (e) {
        console.error("Message send error:", e);
        alert(`Failed to send message: ${e.message}`);
    }
}

function loadMembers() {
    if (currentViewMode !== 'server') return;
    const list = document.getElementById('member-list');
    list.innerHTML = '';
    let visibleCount = 0;

    allProfilesCache.forEach(m => {
        if (myBlocks.includes(m.name)) return;
        visibleCount++;
        
        list.innerHTML += `
            <div class="member-item" onclick="openUserProfile('${m.name}')">
                <div style="position:relative;">
                    <img src="${m.avatar_url}" style="width:32px;height:32px;border-radius:50%; object-fit:cover;">
                    <div class="status-dot"></div>
                </div>
                <span>${m.name}</span>
            </div>
        `;
    });
    document.getElementById('online-count').textContent = visibleCount;
}

function subscribeToRealtime() {
    if (realtimeChannel) {
        client.removeChannel(realtimeChannel);
    }

    let filterField = currentChat.type === "channel" ? "channel" : "dm_key";
    let filterValue = currentChat.id;

    realtimeChannel = client.channel(`chat-${filterValue}`)
        .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'messages', filter: `${filterField}=eq.${filterValue}` }, (payload) => {
            if (myBlocks.includes(payload.new.name)) return; 
            renderMessage(payload.new);
        }).subscribe();
}
