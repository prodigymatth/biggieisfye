<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ChupapiGPT | Super Smart</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #080410; color: #e0d0ff; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 20px; }
        .msg { max-width: 80%; padding: 12px 18px; border-radius: 15px; line-height: 1.5; }
        .user { align-self: flex-end; background: #2a104a; border: 1px solid #9d4edd; }
        .ai { align-self: flex-start; background: #120820; border-left: 4px solid #9d4edd; }
        .bar { padding: 20px; display: flex; background: #10081a; border-top: 1px solid #2a104a; }
        input { flex: 1; background: #1a0f2e; border: 1px solid #3c2366; color: white; padding: 15px; border-radius: 10px; outline: none; }
        button { background: #9d4edd; border: none; color: white; padding: 0 25px; border-radius: 10px; margin-left: 10px; cursor: pointer; font-weight: bold; }
        pre { background: #000; padding: 10px; border-radius: 8px; overflow-x: auto; color: #a5d6ff; }
    </style>
</head>
<body>

<div id="chat"></div>
<div id="status" style="text-align: center; font-size: 10px; color: #7b5ea7; padding: 5px;"></div>
<div class="bar">
    <input type="text" id="in" placeholder="Ask ChupapiGPT anything..." onkeypress="if(event.key==='Enter') send()">
    <button onclick="send()">✦</button>
</div>

<script>
    const KEY = "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";
    // Using the 70B model for "Super Smart" logic
    const MODEL = "llama-3.3-70b-versatile"; 
    let history = [];

    async function send() {
        const input = document.getElementById('in');
        const val = input.value.trim();
        if(!val) return;

        add('user', val);
        input.value = '';
        document.getElementById('status').innerText = "CHUPAPI IS ANALYZING...";

        try {
            const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Content-Type": "application/json", "Authorization": `Bearer ${KEY}` },
                body: JSON.stringify({
                    model: MODEL,
                    messages: [
                        { role: "system", content: "You are ChupapiGPT, a hyper-intelligent, witty, and master-level coding assistant. You provide complex logic but explain it simply. You are grounded, candid, and use Markdown." },
                        ...history.slice(-10), // This is the "Smart" part: it remembers the last 10 messages
                        { role: "user", content: val }
                    ],
                    temperature: 0.5 // Lower temperature = higher intelligence/less rambling
                })
            });

            const data = await res.json();
            const reply = data.choices[0].message.content;
            
            add('ai', reply);
            history.push({ role: "user", content: val }, { role: "assistant", content: reply });
        } catch (e) {
            add('ai', "System Error: Brain link failed.");
        } finally {
            document.getElementById('status').innerText = "";
        }
    }

    function add(role, text) {
        const div = document.createElement('div');
        div.className = `msg ${role}`;
        div.innerHTML = role === 'ai' ? marked.parse(text) : text;
        document.getElementById('chat').appendChild(div);
        document.getElementById('chat').scrollTop = document.getElementById('chat').scrollHeight;
    }
</script>

</body>
</html>
